# ─────────────────────────────────────────────────────────────────────────────
#  podman-compose.wsl.yml
#
#  WSL2-specific compose file — uses host networking to avoid aardvark-dns
#  issues on WSL2 without systemd.
#
#  Services:  postgres | pgadmin | backend | frontend
#
#  Usage:
#    podman-compose -f podman-compose.wsl.yml up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: odin-postgres
    restart: unless-stopped
    network_mode: host
    environment:
      POSTGRES_DB: ${DB_NAME:-odin}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── pgAdmin ────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: odin-pgadmin
    restart: unless-stopped
    network_mode: host
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_LISTEN_PORT: 8003
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./backend/pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres

  # ── Backend (Node / Express) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    image: odin-backend:dev
    container_name: odin-backend
    restart: unless-stopped
    network_mode: host
    environment:
      PORT: ${PORT:-8001}
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      QUEUE_INGEST_KEY: ${QUEUE_INGEST_KEY:-CHANGE_ME_DEV_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      DB_HOST: localhost
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@localhost:${DB_PORT:-5432}/${DB_NAME:-odin}"
    depends_on:
      - postgres

  # ── Frontend (Vite Static Build Profile) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    image: odin-frontend:dev
    container_name: odin-frontend
    restart: unless-stopped
    network_mode: host
    environment:
      NODE_ENV: development
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8001}
      BACKEND_URL: ${BACKEND_URL:-http://localhost:8001}
    depends_on:
      - backend

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  pgadmin_data:
