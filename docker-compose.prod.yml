# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.prod.yml  —  production overrides
#  Usage:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────
services:

  backend:
    command: node server.js # production: no nodemon, no hot-reload
    environment:
      NODE_ENV: production

  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile # static build + serve
    image: odin-frontend:prod
    command: serve -s dist -l 5173
    environment:
      NODE_ENV: production
    volumes: [] # no source mount in prod
