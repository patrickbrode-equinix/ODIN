# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.prod.yml  —  production overrides
#  Usage:  docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# ─────────────────────────────────────────────────────────────────────────────
services:

  backend:
    command: node server.js # production: no nodemon, no hot-reload
    environment:
      NODE_ENV: production

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile # static build + serve
      args:
        VITE_API_BASE_URL: "/api"
    image: odin-frontend:prod
    command: ["node", "server.js"]
    environment:
      NODE_ENV: production
      PORT: 8000
      BACKEND_URL: http://backend:8001
      VITE_API_BASE_URL: /api
    volumes: [] # no source mount in prod
