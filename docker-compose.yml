# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.yml  (Portainer / Podman / Docker — Oracle Linux)
#
#  Bridge networking via odin-net. Use this file for Portainer stacks.
#  NOTE: host port 8000 is reserved by Portainer/Chisel — frontend uses 8080.
#
#  Services:  postgres | pgadmin | backend | frontend
#  Host ports:
#    - PostgreSQL:  5432  (internal only — remove port mapping if not needed)
#    - Backend:     8001
#    - Frontend:    8080  → container 8000
#    - pgAdmin:     8003
#
#  Usage (Portainer stack):
#    Paste this file; set env vars from .env.example.
#
#  Usage (CLI):
#    podman compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: odin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-odin}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      odin-net:
        aliases:
          - postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-odin}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── pgAdmin ────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: odin-pgadmin
    restart: unless-stopped
    ports:
      - "8003:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./backend/pgadmin-servers.json:/pgadmin4/servers.json
    networks:
      odin-net:
        aliases:
          - pgadmin
    depends_on:
      postgres:
        condition: service_healthy

  # ── Backend (Node / Express) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: odin-backend:prod
    container_name: odin-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      QUEUE_INGEST_KEY: ${QUEUE_INGEST_KEY:-CHANGE_ME_DEV_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-odin}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-odin}"
    networks:
      odin-net:
        aliases:
          - backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8001/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ── Frontend (Vite Static Build) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "/api"
    image: odin-frontend:prod
    container_name: odin-frontend
    restart: unless-stopped
    ports:
      - "8080:8000"   # host 8080 — port 8000 is occupied by Portainer/Chisel
    environment:
      NODE_ENV: production
      PORT: 8000
      BACKEND_URL: "http://backend:8001"
      VITE_API_BASE_URL: "/api"
    networks:
      odin-net:
        aliases:
          - frontend
    depends_on:
      backend:
        condition: service_healthy

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  pgadmin_data:

# ── Networks ─────────────────────────────────────────────────────────────────
networks:
  odin-net:
    driver: bridge
