# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.yml  (Podman Desktop compatible)
#
#  Uses host networking to avoid aardvark-dns issues on WSL2 without systemd.
#  Healthchecks removed (require systemd timers not available in WSL2).
#
#  Services:  postgres | pgadmin | backend | frontend
#  Ports (all on host network):
#    - PostgreSQL:  5432
#    - Backend:     8001
#    - Frontend:    8000
#    - pgAdmin:     8003
#
#  Usage (Podman Desktop):
#    1. Open Podman Desktop
#    2. Click "Play" on this compose file via Compose tab
#
#  Usage (CLI):
#    podman compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: odin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-odin}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ── pgAdmin ────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: odin-pgadmin
    restart: unless-stopped
    ports:
      - "8003:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./Backend/pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres

  # ── Backend (Node / Express) ───────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: odin-backend:prod
    container_name: odin-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-in-production}
      JWT_EXPIRES_IN: 8h
      QUEUE_INGEST_KEY: ${QUEUE_INGEST_KEY:-dev-key-123}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-odin}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-odin}"
    depends_on:
      - postgres

  # ── Frontend (Vite Static Build) ───────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "/api"
    image: odin-frontend:prod
    container_name: odin-frontend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: "/api"
      BACKEND_URL: "http://backend:8001"
    depends_on:
      - backend

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  pgadmin_data:
