# ─────────────────────────────────────────────────────────────────────────────
#  docker-compose.yml  (Podman Desktop compatible)
#
#  Uses host networking to avoid aardvark-dns issues on WSL2 without systemd.
#  Healthchecks removed (require systemd timers not available in WSL2).
#
#  Services:  postgres | pgadmin | backend | frontend
#  Ports (all on host network):
#    - PostgreSQL:  5432
#    - Backend:     8001
#    - Frontend:    8000
#    - pgAdmin:     8003
#
#  Usage (Podman Desktop):
#    1. Open Podman Desktop
#    2. Click "Play" on this compose file via Compose tab
#
#  Usage (CLI):
#    podman compose up -d --build
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: odin-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-odin}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-odin}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── pgAdmin ────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: odin-pgadmin
    restart: unless-stopped
    ports:
      - "8003:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./Backend/pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      - postgres

  # ── Backend (Node / Express) ───────────────────────────────────────────────
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: odin-backend:prod
    container_name: odin-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: ${PORT:-8001}
      NODE_ENV: ${NODE_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-dev-only-insecure-secret}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      QUEUE_INGEST_KEY: ${QUEUE_INGEST_KEY:-CHANGE_ME_DEV_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8000}
      DB_HOST: ${DB_HOST:-postgres}
      # Override DB connection to use the compose service name + DATABASE_URL
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@${DB_HOST:-postgres}:${DB_PORT:-5432}/${DB_NAME:-odin}"
    depends_on:
      - postgres

  # ── Frontend (Vite Static Build) ───────────────────────────────────────────
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: odin-frontend:prod
    container_name: odin-frontend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      # Tells vite.config.ts where to proxy /api requests normally, but statically built
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-}
    depends_on:
      - backend

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  pgadmin_data:
