# ─────────────────────────────────────────────────────────────────────────────
#  podman-compose.yml
#
#  Services:  postgres | backend | frontend
#  Networks:  shift-net  (created here — NOT external)
#
#  Usage:
#    Local dev:   podman-compose up
#    Production:  podman-compose -f podman-compose.yml -f docker-compose.prod.yml up -d
#
#  All secrets live in backend/.env  (copy from backend/.env.example)
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: odin-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-odin}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - shift-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-odin}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── pgAdmin ────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    container_name: odin-pgadmin
    restart: unless-stopped
    ports:
      - "8003:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@admin.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./backend/pgadmin-servers.json:/pgadmin4/servers.json
    networks:
      - shift-net
    depends_on:
      - postgres

  # ── Backend (Node / Express) ───────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: odin-backend:prod
    container_name: odin-backend
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      PORT: 8001
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-please-change-this-secret-in-production}
      JWT_EXPIRES_IN: 8h
      QUEUE_INGEST_KEY: ${QUEUE_INGEST_KEY:-dev-key-123}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-odin}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-odin}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - shift-net

  # ── Frontend (Vite Static Build) ───────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: "/api"
    image: odin-frontend:prod
    container_name: odin-frontend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      NODE_ENV: production
      VITE_API_BASE_URL: "/api"
      BACKEND_URL: "http://backend:8001"
    depends_on:
      - backend
    networks:
      - shift-net

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres_data: # persistent DB data — survives container restarts
  pgadmin_data: # persistent pgAdmin data
  backend_node_modules:
  frontend_node_modules:

    # ── Networks ──────────────────────────────────────────────────────────────────
networks:
  shift-net:
    driver: bridge # created here; no longer external
